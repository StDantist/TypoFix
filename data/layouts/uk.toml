# Українська (розширена) ЙЦУКЕН.
#
# scancode = Windows scancode set 1 (фізична позиція клавіші, не залежить від
# активної розкладки). Фізичні позиції відповідають тим самим клавішам, що й у
# en.toml: напр. G(0x22)→п, H(0x23)→р, B(0x30)→и. Тому послідовність "ghbdsn",
# набрана фізично, читається в цій розкладці як "привіт".
#
# Це fallback/еталон: у рантаймі мапінг беремо з ОС. Див. data/CLAUDE.md.
#
# Апостроф — типографський ’ (U+2019), а не ASCII '. Окремо є ґ/Ґ і і/ї/є.

id = "uk"
name = "Українська (розширена)"

# --- цифровий ряд ---------------------------------------------------------
[[key]]
scancode = 0x02
normal = "1"
shift = "!"
[[key]]
scancode = 0x03
normal = "2"
shift = "\""
[[key]]
scancode = 0x04
normal = "3"
shift = "№"
[[key]]
scancode = 0x05
normal = "4"
shift = ";"
[[key]]
scancode = 0x06
normal = "5"
shift = "%"
[[key]]
scancode = 0x07
normal = "6"
shift = ":"
[[key]]
scancode = 0x08
normal = "7"
shift = "?"
[[key]]
